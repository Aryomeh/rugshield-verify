<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify — RugShield</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600&display=swap"
    rel="stylesheet" />
  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #09090d;
      --surface: #111118;
      --border: #1f1f2e;
      --accent: #6c5ce7;
      --accent-dim: #4a3fa0;
      --gold: #f0c94a;
      --text: #e8e6f0;
      --muted: #6b6880;
      --success: #00e99e;
      --danger: #ff4757;
      --radius: 14px;
    }

    html,
    body {
      height: 100%;
      background-color: var(--bg);
      font-family: 'Sora', sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 440px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .logo-container {
      margin-bottom: 24px;
    }

    .logo-badge {
      display: inline-block;
      background: rgba(108, 92, 231, 0.1);
      border: 1px solid rgba(108, 92, 231, 0.2);
      padding: 6px 14px;
      border-radius: 30px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--accent);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .group-highlight {
      color: var(--gold);
      font-weight: 600;
    }

    .captcha-container {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
      min-height: 78px;
    }

    .btn {
      display: block;
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:hover:not(:disabled) {
      background: var(--accent-dim);
    }

    .btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status-msg {
      margin-top: 16px;
      font-size: 13px;
      line-height: 1.4;
      display: none;
      padding: 10px;
      border-radius: 8px;
      font-family: 'Space Mono', monospace;
    }

    .status-info {
      display: block;
      background: rgba(108, 92, 231, 0.05);
      color: var(--accent);
      border: 1px solid rgba(108, 92, 231, 0.1);
    }

    .status-success {
      display: block;
      background: rgba(0, 233, 158, 0.05);
      color: var(--success);
      border: 1px solid rgba(0, 233, 158, 0.1);
    }

    .status-error {
      display: block;
      background: rgba(255, 71, 87, 0.05);
      color: var(--danger);
      border: 1px solid rgba(255, 71, 87, 0.1);
    }
  </style>
</head>

<body>

  <div class="card" id="main-card">
    <div class="logo-container">
      <span class="logo-badge">🛡️ RugShield Verification</span>
    </div>

    <h1 id="headline">Human Verification</h1>
    <p class="subtitle" id="subtext">
      Please complete the captcha below to gain access to <span class="group-highlight" id="group-name">the
        group</span>.
    </p>

    <div class="captcha-container">
      <div class="h-captcha" data-sitekey="8b20346e-e99e-42ee-a494-204e690a1d1e" data-callback="onCaptchaSuccess"
        data-expired-callback="onCaptchaExpired" data-error-callback="onCaptchaError">
      </div>
    </div>

    <button class="btn" id="verify-btn" onclick="submitVerify()" disabled>
      Verify &amp; Return to Bot
    </button>

    <div class="status-msg" id="status-box"></div>
  </div>

  <script>
    // ── CONFIGURATION ────────────────────────────────────────────────────────
    const BOT_USERNAME = "rugshieldbot";

    // ── BACKEND ENDPOINT (your Vercel serverless function) ───────────────────
    // This must be a server-side route that calls hCaptcha's siteverify API
    // using your HCAPTCHA_SECRET key — never expose that key here.
    const VERIFY_API_ENDPOINT = "/api/verify";

    // ── URL PARAMS ───────────────────────────────────────────────────────────
    const urlParams = new URLSearchParams(window.location.search);
    const TOKEN = urlParams.get('token');
    const UID = urlParams.get('uid');
    const CID = urlParams.get('cid');
    const GROUP = urlParams.get('group');

    // ── RUNTIME STATE ────────────────────────────────────────────────────────
    // Tracks whether the hCaptcha widget has produced a fresh, unexpired token.
    // This is a UI convenience only — the real verification happens server-side.
    let captchaToken = null;

    // ── HARD GUARD: abort immediately if required URL params are missing ──────
    // This prevents someone from loading the page without a valid bot-issued link.
    if (!TOKEN || !UID || !CID) {
      document.getElementById('verify-btn').disabled = true;
      setStatus('error', '❌ Invalid or missing session parameters. Use the link provided by the bot.');
    }

    // Populate group name from URL
    if (GROUP) {
      document.getElementById('group-name').textContent = decodeURIComponent(GROUP);
    }

    function setStatus(type, text) {
      const box = document.getElementById('status-box');
      box.className = 'status-msg';
      if (!type) {
        box.style.display = 'none';
        return;
      }
      box.classList.add('status-' + type);
      box.textContent = text;
    }

    // ── HCAPTCHA CALLBACKS ────────────────────────────────────────────────────
    function onCaptchaSuccess(token) {
      captchaToken = token;
      // Only enable the button if required params are also present
      if (TOKEN && UID && CID) {
        document.getElementById('verify-btn').disabled = false;
        setStatus('info', '✅ Captcha cleared. Ready to return to bot!');
      }
    }

    function onCaptchaExpired() {
      captchaToken = null;
      document.getElementById('verify-btn').disabled = true;
      setStatus('error', '❌ Captcha expired. Please check the checkbox again.');
    }

    function onCaptchaError(err) {
      captchaToken = null;
      document.getElementById('verify-btn').disabled = true;
      setStatus('error', '⚠️ An error occurred during captcha rendering.');
      console.error("hCaptcha Error:", err);
    }

    // ── SUBMIT ────────────────────────────────────────────────────────────────
    async function submitVerify() {
      // Client-side guards (defence-in-depth — real check is server-side)
      if (!captchaToken) {
        setStatus('error', '❌ Please complete the captcha first.');
        return;
      }
      if (!TOKEN || !UID || !CID) {
        setStatus('error', '❌ Session parameters missing. Use the link provided by the bot.');
        return;
      }

      const btn = document.getElementById('verify-btn');
      btn.disabled = true;
      btn.textContent = 'Verifying…';
      setStatus('info', '⏳ Checking your response…');

      try {
        // ── SERVER-SIDE CAPTCHA VERIFICATION ─────────────────────────────────
        // The server calls hCaptcha's siteverify API with the SECRET key and
        // also validates that TOKEN/UID/CID are known and unused in your DB.
        // The hCaptcha token is one-time-use and tied to the sitekey+secret pair,
        // so it cannot be replayed or fabricated from the client side.
        const res = await fetch(VERIFY_API_ENDPOINT, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            captcha_token: captchaToken,
            token: TOKEN,
            uid: UID,
            cid: CID,
          }),
        });

        // Guard against non-JSON or network-level error responses
        let data;
        try {
          data = await res.json();
        } catch {
          throw new Error('Server returned an unreadable response.');
        }

        if (!res.ok || !data.ok) {
          // Surface the server's own error reason if provided
          const reason = data?.reason || 'Verification rejected by server.';
          setStatus('error', `❌ ${reason}`);
          btn.disabled = false;
          btn.textContent = 'Verify & Return to Bot';
          // Reset the captcha widget so the user must solve it again
          if (typeof hcaptcha !== 'undefined') hcaptcha.reset();
          captchaToken = null;
          return;
        }

        // ── SUCCESS: redirect back to bot ─────────────────────────────────────
        // The server has already confirmed the captcha AND the session token.
        // The bot's _start_router will call consume_verification_token() which
        // performs its own DB-side expiry + one-time-use check before issuing
        // an invite link — so even if this redirect were faked, the token
        // would be rejected by the bot if it was never validated server-side.
        setStatus('success', '🎉 Verified! Returning you to Telegram…');
        btn.textContent = 'Redirecting…';

        setTimeout(() => {
          window.location.href = `https://t.me/${BOT_USERNAME}?start=verified_${TOKEN}`;
        }, 1200);

      } catch (err) {
        console.error('Verify fetch failed:', err);
        setStatus('error', '❌ Network error. Please check your connection and try again.');
        btn.disabled = false;
        btn.textContent = 'Verify & Return to Bot';
        if (typeof hcaptcha !== 'undefined') hcaptcha.reset();
        captchaToken = null;
      }
    }
  </script>
</body>

</html>
